<div id="applyModal" class="modal">
  <div class="modal-content">
    <h2>이벤트 신청하기</h2>
    <p id="counter">신청 현황 확인 중...</p>
    <form id="applyForm">
      <input type="text" id="userName" placeholder="성함" required>
      <input type="tel" id="userTel" placeholder="연락처 (010-0000-0000)" required>
      <button type="submit" id="submitBtn">신청하기</button>
    </form>
    <button onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
async function handleApply(e) {
  e.preventDefault();
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  
  const payload = {
    name: document.getElementById('userName').value,
    tel: document.getElementById('userTel').value
  };

  try {
    const response = await fetch('YOUR_GAS_WEBAPP_URL', {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    alert(result.message);
    if(result.result === 'success') location.reload();
  } catch (error) {
    alert("신청 중 오류가 발생했습니다.");
  } finally {
    submitBtn.disabled = false;
  }
}
document.getElementById('applyForm').onsubmit = handleApply;
</script>
