<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" /> 
  <title>MONOBLOC | 이벤트</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <main class="page">
    <figure class="onepage">
      <img
        class="onepage__img"
        src="/images/monobloc_ads.png"
        alt="중구 스마트쉘터 이벤트 안내"
        data-base-w="1080"
        data-base-h="2554" 
        loading="eager"
        decoding="async"
        fetchpriority="high"
      />
      
      <div 
        class="click-target" 
        data-tel="16004778"
        data-x="735"   /* 중심 X 좌표 */
        data-y="2220"  /* 중심 Y 좌표 */
        data-w="400"   /* 클릭 영역 너비 */
        data-h="80"    /* 클릭 영역 높이 */
      >
        <div class="glass-button"></div>
      </div>
    </figure>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
