<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" /> 
  <title>MONOBLOC | 이벤트</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <main class="page">
    <figure class="onepage">
      <img
        class="onepage__img"
        src="/images/monobloc_ads.png"
        alt="중구 스마트쉘터 이벤트 안내"
        data-base-w="1080"
        data-base-h="3400" 
        loading="eager"
        decoding="async"
        fetchpriority="high"
      />
      
      <div 
        class="click-target" 
        data-x="120"    /* 왼쪽 끝에서 시작하도록 X값을 줄였습니다 */
        data-y="2940"   /* 이미지 상단 버튼 높이에 맞춰 Y값을 조정했습니다 */
        data-w="385"    /* 버튼의 가로 크기 */
        data-h="95"    /* 버튼의 세로 크기 */
      >
        <div class="glass-button"></div>
      </div>
      <div 
        class="click-target" 
        data-x="575"    /* 왼쪽 버튼(125) + 버튼너비(380) + 간격 고려 */
        data-y="2940"   /* 왼쪽 버튼과 동일한 높이 */
        data-w="385"    /* 동일한 버튼 크기 */
        data-h="95" 
        onclick="window.location.href='https://adv.monobloc.co.kr'"
      >
        <div class="glass-button"></div>
      </div>
    </figure>

    <div id="modal" class="modal-overlay">
      <div class="modal-box">
        <h3>선착순 신청하기<br>(테스트중 30일까지 신청가능)</h3>
        <p id="periodText" style="line-height: 1.5;">신청 기간 계산 중...</p>
        <p><strong>* 항목은 필수 기입해야 합니다.</strong></p>
        <form id="applyForm">
          <input type="text" id="userName" placeholder="* 성함 (필수 기입)" required>
          <input type="tel" id="userTel" placeholder="* 연락처 ('-' 없이 숫자만, 필수 기입)" required>
          <input type="email" id="userEmail" placeholder="* 이메일 (필수 기입)" required>
          <textarea id="applyContent" placeholder="신청 내용" required style="width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; height: 80px; resize: none;"></textarea>
          <button type="submit" id="submitBtn">신청하기 / 순번 확인</button>
        </form>
        <p>
          <span class="highlight">* 이미 신청하신 분은 연락처 기준으로<br>순번 확인이 가능합니다.</span>
        </p>
        <button type="button" id="closeBtn">닫기</button>
      </div>
    </div>
    <div id="resultModal" class="modal-overlay">
      <div class="modal-box" style="border: 2px solid #000; max-width: 400px;">
        <div id="resultText" style="font-size: 22px; font-weight: 800; line-height: 1.5; color: #000; padding: 20px 0; white-space: pre-line; word-break: keep-all;">
          </div>
        <button type="button" id="resultCloseBtn" style="width:100%; padding:14px; background:#000; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">확인</button>
      </div>
    </div>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
